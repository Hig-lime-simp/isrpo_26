<!DOCTYPE html>
<html lang="ru-RU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Менеджер задач - Lab26</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Менеджер задач</h1>
        <h2>Управляй своими делами</h2>
        
        <div class="task-form">
            <input type="text" id="taskInput" placeholder="Введите новую задачу...">
            <button id="addTask">Добавить</button>
        </div>
        
        <div class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="active">Активные</button>
            <button class="filter-btn" data-filter="completed">Завершённые</button>
        </div>
        
        <ul id="taskList">
        </ul>
        
        <div class="stats">
            <p>Всего задач: <span id="totalTasks">0</span></p>
            <p>Выполнено: <span id="completedTasks">0</span></p>
        </div>
    </div>
    
    <script type="module" src="js/api.js"></script>
</body>
</html>
